<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EX_20</title>
<style>
  body {
    font-family: Arial, sans-serif;
  }

  table {
    border-collapse: collapse;
    margin: 50px;
  }

  th, td {
    border: 2px solid #555;
    padding: 10px 20px;
    text-align: center;
  }

  th {
    background-color: #888;
    color: white;
  }

  tr:nth-child(odd) td {
    background-color: yellow;
  }

  tr:nth-child(even) td {
    background-color: #ddd;
  }

  .fixed-box {
    position: fixed;
    top: 20px;
    right: 20px;
    border: 3px solid green;
    padding: 15px;
    width: 180px;
    background-color: #fff;
  }
</style>
</head>

<body>

<table>
  <tr>
    <th>Firstname</th>
    <th>Lastname</th>
  </tr>
  <tr>
    <td>1</td>
    <td>1</td>
  </tr>
  <tr>
    <td>2</td>
    <td>2</td>
  </tr>
  <tr>
    <td>3</td>
    <td>3</td>
  </tr>
</table>

<div class="fixed-box">
</div>

</body>
</html>
