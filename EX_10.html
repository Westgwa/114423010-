<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      padding: 30px;
    }

    .code-box {
      width: 320px;
      background-color: #f2f2f2;
      border: 2px solid #666;
      box-shadow: 4px 4px 6px rgba(0, 0, 0, 0.35);
      padding: 16px 18px;
    }

    .title {
      font-family: "Times New Roman", serif;
      font-size: 34px;
      margin-bottom: 18px;
    }

    pre {
      margin: 0;
      font-family: "Courier New", monospace;
      font-size: 24px;
      line-height: 1.3;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="code-box">
    <div class="title">EX_10:</div>
    <pre>var person = {
    firstName:"明儒",
    lastName :"郭",
    studentId:"114423010"
}</pre>
  </div>
</body>
</html>
