<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    body {
      background: #e9e9e9;
      padding: 40px;
      font-family: "Times New Roman", serif;
    }

    .card {
      width: 480px;
      background: #f5f5f5;
      padding: 20px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    /* 第一個 */
    .box1 {
      background: #bfeaff;
      border: 4px solid #ff5a3c;
      outline: 4px solid #ff8a65;
      outline-offset: -10px;
      padding: 8px;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    /* 第二個 */
    .box2 {
      background: yellow;
      border: 3px solid #1e90ff;
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    /* 第三個：只有一圈點點邊框 */
    .box3 {
      position: relative;
      background: #43c08b;
      padding: 12px;
      font-size: 28px;
      font-weight: bold;
    }

    .box3::before {
      content: "";
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      border: 6px dotted #888;
      pointer-events: none;
    }

  </style>
</head>
<body>

  <div class="card">
    <div class="box1">Hello World</div>
    <div class="box2">Hello World</div>
    <div class="box3">Hello World</div>
  </div>

</body>
</html>
