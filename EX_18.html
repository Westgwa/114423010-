<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Headings Design</title>
<style>
  body {
    background: #e9e9e9;
    padding: 40px;
    font-family: "Times New Roman", serif;
  }

  .card {
    width: 600px;
    background: #f5f5f5;
    padding: 20px;
    margin: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  }


  .h1 {
    font-size: 42px;
    font-weight: bold;
    text-shadow: 2px 2px 0 red;
    border-top: 6px solid black;
    display: inline-block;
    padding-top: 5px;
    margin-bottom: 30px;
  }


  .h2 {
    font-size: 28px;
    font-style: italic;
    padding: 8px 12px;
    margin-bottom: 30px;

    border: 3px solid black;    
    outline: 5px solid yellow;   
    outline-offset: 0px;
  }

  .h3 {
    font-size: 24px;
    text-align: right;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="card">
  <div class="h1">This is heading 1</div>
  <div class="h2">This is heading 2</div>
  <div class="h3">This is heading 3</div>
</div>

</body>
</html>
